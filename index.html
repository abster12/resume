<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhigyan — Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 48px;
            max-width: 480px;
            width: 90%;
            text-align: center;
        }
        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #58a6ff, #3fb950);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 24px;
        }
        h1 { font-size: 28px; font-weight: 600; color: #f0f6fc; margin-bottom: 8px; }
        .subtitle { color: #8b949e; font-size: 15px; margin-bottom: 32px; }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #238636;
            color: #fff;
            border: 1px solid #2ea043;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            transition: background 0.15s;
        }
        .download-btn:hover { background: #2ea043; }
        .preview-link {
            display: inline-block;
            margin-top: 20px;
            color: #58a6ff;
            font-size: 14px;
            text-decoration: none;
        }
        .preview-link:hover { text-decoration: underline; }
        .meta {
            margin-top: 32px;
            font-size: 12px;
            color: #484f58;
        }
        .meta a { color: #484f58; }
    </style>
</head>
<body>
    <div class="card">
        <div class="avatar">A</div>
        <h1>Abhigyan</h1>
        <p class="subtitle">Senior Software Engineer — Backend, Distributed Systems, AI/LLM</p>
        <a href="resume.pdf" class="download-btn" download>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download Resume PDF
        </a>
        <br>
        <a href="resume.pdf" class="preview-link" target="_blank">Open in browser →</a>
        <p class="meta">
            Auto-compiled from LaTeX &bull; <a href="https://github.com/abster12/resume">Source on GitHub</a>
        </p>
    </div>
</body>
</html>
