name: Compile LaTeX & Deploy to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-latex-base texlive-latex-recommended texlive-latex-extra

      - name: Compile LaTeX
        run: |
          pdflatex -interaction=nonstopmode abhigyan_resume.tex
          pdflatex -interaction=nonstopmode abhigyan_resume.tex
          mv abhigyan_resume.pdf resume.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: resume.pdf

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Pages site
        run: |
          mkdir -p _site
          cp resume.pdf _site/
          cp index.html _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: compile
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
